# Sample workflow for building and deploying a mdBook site to GitHub Pages
#
# To get started with mdBook see: https://rust-lang.github.io/mdBook/index.html
#
name: Deploy Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - "docs/**" # 仅当 docs 目录有更改时触发

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.4.36
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf -y | sh
          rustup update
          cargo install --version ${MDBOOK_VERSION} mdbook
          cargo install mdbook-admonish
          cargo install mdbook-alerts
          cargo install mdbook-pagetoc --version 0.2.2
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with mdBook
        run: mdbook build
        working-directory: docs
      - name: Fix URLs (.md to .html)
        run: |
          # 将 canonical/OG URL 中的 .md 替换为 .html
          find docs/book -name "*.html" -exec sed -i 's|renyan.org/hello/rust/\([^"]*\)\.md|renyan.org/hello/rust/\1.html|g' {} +
      - name: Generate sitemap
        run: |
          cd docs/book
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          echo '  <url>' >> sitemap.xml
          echo '    <loc>https://renyan.org/hello/rust/</loc>' >> sitemap.xml
          echo '    <priority>1.0</priority>' >> sitemap.xml
          echo '    <changefreq>weekly</changefreq>' >> sitemap.xml
          echo '  </url>' >> sitemap.xml
          find . -name "*.html" ! -name "print.html" ! -name "404.html" | sort | while read -r file; do
            url=$(echo "$file" | sed 's|^\./||' | sed 's|^|https://renyan.org/hello/rust/|')
            echo '  <url>' >> sitemap.xml
            echo "    <loc>$url</loc>" >> sitemap.xml
            echo '    <priority>0.8</priority>' >> sitemap.xml
            echo '    <changefreq>monthly</changefreq>' >> sitemap.xml
            echo '  </url>' >> sitemap.xml
          done
          echo '</urlset>' >> sitemap.xml
          echo "Generated sitemap.xml with $(grep -c '<url>' sitemap.xml) entries"
      - name: Copy robots.txt
        run: cp docs/src/robots.txt docs/book/robots.txt
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
