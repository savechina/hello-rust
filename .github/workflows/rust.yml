name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        uses: rui314/setup-mold@v1

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Protoc
        uses: arduino/setup-protoc@v2
        with:
          version: "29.3"

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Build
        run: CARGO_BUILD_JOBS=1 cargo build --verbose

      - name: Run tests
        run: cargo nextest run --verbose --no-fail-fast --retries 2
