name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  # Limit parallelism to avoid OOM on GitHub Actions runners (7GB RAM)
  CARGO_BUILD_JOBS: 1
  CARGO_NET_RETRY: 3

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Install Protoc
        uses: arduino/setup-protoc@v2
        with:
          version: "29.3"
      # Add swap to prevent OOM kills during heavy linking
      - name: Configure Swap
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
