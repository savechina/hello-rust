[book]
authors = ["RenYan Wei"]
language = "zh-CN"
multilingual = false
src = "src"
title = "Hello Rust - Rust 编程从入门到实战教程"
description = "Hello Rust 是一套完整的 Rust 编程教程，涵盖基础语法、异步编程、Web 开发、数据库、微服务等 80+ 章节，附带 15+ 可运行的二进制示例代码。"

[preprocessor.admonish]
# command = "mdbook-admonish"
assets_version = "3.1.0" # do not edit: managed by `mdbook-admonish install`

[preprocessor.alerts]
# command = "mdbook-alerts"

[preprocessor.pagetoc]

[output.html]
# 指定输出目录为 docs
default-theme = "light"
#root = "/hello-rust/"
git-repository-url = "https://github.com/savechina/hello-rust"
git-repository-icon = "fa-github"
additional-css = ["./assets/css/mdbook-admonish.css", "./theme/pagetoc.css"]
additional-js = ["./theme/pagetoc.js"]
# site-url = "/hello-rust/"
