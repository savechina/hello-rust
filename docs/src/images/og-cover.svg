<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f74c00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Rust-inspired gear shape -->
  <circle cx="200" cy="315" r="120" fill="none" stroke="#f74c00" stroke-width="8" opacity="0.3"/>
  <circle cx="200" cy="315" r="90" fill="none" stroke="#f74c00" stroke-width="4" opacity="0.5"/>
  <circle cx="200" cy="315" r="60" fill="#f74c00" opacity="0.2"/>

  <!-- Gear teeth -->
  <g fill="#f74c00" opacity="0.3">
    <rect x="185" y="175" width="30" height="40" rx="5"/>
    <rect x="185" y="415" width="30" height="40" rx="5"/>
    <rect x="60" y="300" width="40" height="30" rx="5"/>
    <rect x="300" y="300" width="40" height="30" rx="5"/>
    <rect x="100" y="210" width="30" height="40" rx="5" transform="rotate(45 115 230)"/>
    <rect x="270" y="380" width="30" height="40" rx="5" transform="rotate(45 285 400)"/>
    <rect x="100" y="380" width="30" height="40" rx="5" transform="rotate(-45 115 400)"/>
    <rect x="270" y="210" width="30" height="40" rx="5" transform="rotate(-45 285 230)"/>
  </g>

  <!-- Main text -->
  <text x="380" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff">
    Hello Rust
  </text>

  <!-- Subtitle -->
  <text x="380" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#f74c00" font-weight="600">
    Rust 编程从入门到实战教程
  </text>

  <!-- Description -->
  <text x="380" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a0a0b0">
    80+ 章节 · 15+ IPC 示例 · 中文文档 · 生产级框架
  </text>

  <!-- Tags: 突出教程特色 -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">
    <rect x="380" y="440" width="110" height="32" rx="16" fill="#f74c00" opacity="0.8"/>
    <text x="435" y="462" text-anchor="middle" font-weight="500">15 IPC 示例</text>

    <rect x="505" y="440" width="100" height="32" rx="16" fill="#f74c00" opacity="0.8"/>
    <text x="555" y="462" text-anchor="middle" font-weight="500">生产框架</text>

    <rect x="620" y="440" width="100" height="32" rx="16" fill="#f74c00" opacity="0.8"/>
    <text x="670" y="462" text-anchor="middle" font-weight="500">中文教程</text>

    <rect x="735" y="440" width="100" height="32" rx="16" fill="#f74c00" opacity="0.8"/>
    <text x="785" y="462" text-anchor="middle" font-weight="500">实战导向</text>
  </g>

  <!-- Site URL -->
  <text x="600" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#606070" text-anchor="middle">
    renyan.org/hello/rust
  </text>

  <!-- Bottom accent line -->
  <rect x="380" y="575" width="440" height="4" rx="2" fill="url(#accent)"/>
</svg>
